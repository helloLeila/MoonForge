name: MoonForge CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  gate-cloud-review:
    name: Gate Cloud Review
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit dependencies
        run: |
          moon version --all
          moon update

      - name: Run unit tests
        run: moon test tests/unit

      - name: Run integration tests
        run: moon test tests/integration

      - name: Build project
        run: moon build
