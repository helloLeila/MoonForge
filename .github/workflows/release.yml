name: MoonForge Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release-assets:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: moonforge-linux-x64
            release_os: linux
            release_arch: x64
          - runner: macos-13
            asset_name: moonforge-darwin-x64
            release_os: darwin
            release_arch: x64
          - runner: macos-latest
            asset_name: moonforge-darwin-arm64
            release_os: darwin
            release_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit dependencies
        run: |
          moon version --all
          moon update

      - name: Run tests
        run: moon test

      - name: Build release asset
        env:
          MOONFORGE_RELEASE_OS: ${{ matrix.release_os }}
          MOONFORGE_RELEASE_ARCH: ${{ matrix.release_arch }}
        run: ./scripts/build_release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
