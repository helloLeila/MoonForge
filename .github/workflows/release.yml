name: MoonForge Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to publish, for example v0.1.0
        required: false
        type: string

jobs:
  build-release-assets:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: moonforge-linux-x64
            release_os: linux
            release_arch: x64
          - runner: macos-13
            asset_name: moonforge-darwin-x64
            release_os: darwin
            release_arch: x64
          - runner: macos-latest
            asset_name: moonforge-darwin-arm64
            release_os: darwin
            release_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit dependencies
        run: |
          moon version --all
          moon update

      - name: Run tests
        run: moon test

      - name: Build release asset
        env:
          MOONFORGE_RELEASE_OS: ${{ matrix.release_os }}
          MOONFORGE_RELEASE_ARCH: ${{ matrix.release_arch }}
        run: ./scripts/build_release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

      - name: Publish GitHub release asset
        if: startsWith(inputs.release_tag || github.ref_name, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

  publish-npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: build-release-assets
    if: startsWith(inputs.release_tag || github.ref_name, 'v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check npm package version matches release tag
        working-directory: npm/cli
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ inputs.release_tag || github.ref_name }}"
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "npm package version $PACKAGE_VERSION does not match release tag $RELEASE_TAG"
            exit 1
          fi

      - name: Publish npm package
        working-directory: npm/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --registry https://registry.npmjs.org
